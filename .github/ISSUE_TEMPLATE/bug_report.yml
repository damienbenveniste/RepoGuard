name: Bug report
description: Report a reproducible ScaffoldGuard bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal commands or steps that reproduce the issue.
      placeholder: |
        scaffold-guard ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include ScaffoldGuard version, Python version, OS, and uv version when relevant.
      placeholder: |
        scaffold-guard version
        python --version
        uv --version
    validations:
      required: false

